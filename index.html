<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikolas Alvanidis | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f5f5f5;
            --accent-color: #888;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }

        header {
            padding: 80px 20px 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--accent-color);
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* Στυλ για τις Κατηγορίες */
        .category-section {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .category-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .category-title span {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            background-color: #111;
            aspect-ratio: 16 / 10;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            filter: grayscale(20%); /* Δίνει μια πιο καλλιτεχνική νότα */
        }

        .gallery img:hover {
            transform: scale(1.03);
            filter: grayscale(0%);
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #444;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        /* Mobile Fixes */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Digital Photos</h1>
        <div class="subtitle">by Nikolas Alvanidis</div>
    </header>

    <section class="category-section">
        <div class="category-title">
            Kraków <span>Poland Series</span>
        </div>
        
        <div class="gallery">
            <div class="gallery-item"><img src="photos for portfolio/photo1.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo2.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo3.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo4.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo5.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo6.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo7.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo8.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo9.jpg"></div>
        </div>
    </section>

    <footer>
        NIKOLAS ALVANIDIS &copy; 2026 | ALL RIGHTS RESERVED
    </footer>

</body>
</html>
