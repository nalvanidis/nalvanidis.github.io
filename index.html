<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikolas Alvanidis | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Fredericka+the+Great&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        .motto {
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 300;
            margin-bottom: 10px;
            color: #555;
        }

        h1 {
            font-family: 'Fredericka the Great', cursive;
            font-size: 5rem;
            margin: 0;
            font-weight: normal;
            text-transform: uppercase;
        }

        /* ΕΠΑΝΑΦΟΡΑ ΣΤΥΛ ΚΑΤΗΓΟΡΙΑΣ */
        .category-section {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .category-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            border-bottom: 1px solid #e0e0e0; /* Κομψή γραμμή */
            padding-bottom: 15px;
            margin-bottom: 35px;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .category-title span {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #999;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            overflow: hidden;
            background-color: #f9f9f9;
            aspect-ratio: 3 / 2;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: opacity 0.4s ease;
            cursor: pointer;
        }

        .gallery img:hover {
            opacity: 0.8;
        }

        footer {
            text-align: center;
            padding: 100px 20px 40px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #bbb;
            text-transform: uppercase;
        }

        /* --- LIGHTBOX (IMAGE EXPAND) --- */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
            z-index: 1000;
        }

        #lightbox.visible {
            opacity: 1;
            visibility: visible;
        }

        #lightbox-image {
            max-width: 90%;
            max-height: 85vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2.5rem;
            color: #000;
            background: none;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .category-title { font-size: 1.4rem; flex-direction: column; gap: 5px; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="motto">Shots by Nikolas Alvanidis</div>
        <h1>Digital Photos</h1>
    </header>

    <section class="category-section">
        <div class="category-title">
            Kraków <span>Poland Series</span>
        </div>
        
        <div class="gallery">
            <div class="gallery-item"><img src="photos for portfolio/photo1.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo2.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo3.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo4.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo5.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo6.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo7.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo8.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo9.jpg"></div>
        </div>
    </section>

    <footer>
        NIKOLAS ALVANIDIS &copy; 2026 | ALL RIGHTS RESERVED
    </footer>

    <div id="lightbox">
        <button id="lightbox-close">&times;</button>
        <img id="lightbox-image" src="" alt="Full size">
    </div>

    <script>
        const galleryImages = document.querySelectorAll('.gallery img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const lightboxClose = document.getElementById('lightbox-close');

        galleryImages.forEach(image => {
            image.addEventListener('click', () => {
                lightboxImage.src = image.src;
                lightbox.classList.add('visible');
                document.body.style.overflow = 'hidden';
            });
        });

        const closeLightbox = () => {
            lightbox.classList.remove('visible');
            document.body.style.overflow = '';
        };

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
    </script>

</body>
</html>
