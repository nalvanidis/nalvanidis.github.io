<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikolas Alvanidis | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Fredericka+the+Great&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff; /* Λευκό φόντο */
            color: #1a1a1a; /* Σχεδόν μαύρα γράμματα */
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Το πάνω μέρος (Header) */
        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        .motto {
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 300;
            margin-bottom: 10px;
            color: #333;
        }

        h1 {
            font-family: 'Fredericka the Great', cursive; /* Η "sketch" γραμματοσειρά */
            font-size: 5rem;
            margin: 0;
            font-weight: normal;
            text-transform: uppercase;
        }

        /* --- Η μπάρα μενού NAV αφαιρέθηκε από εδώ --- */

        /* Κατηγορίες Φωτογραφιών */
        .category-section {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .category-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            overflow: hidden;
            background-color: #f9f9f9;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: opacity 0.3s;
            cursor: pointer; /* Δείχνει ότι είναιclickable */
        }

        .gallery img:hover {
            opacity: 0.8; /* Απαλό εφέ στο λευκό φόντο */
        }

        footer {
            text-align: center;
            padding: 80px 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #aaa;
            text-transform: uppercase;
        }

        /* --- LIGHTBOX (IMAGE EXPAND) CSS --- */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95); /* Λευκό-διαφανές φόντο */
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; /* Κρυμμένο αρχικά */
            visibility: hidden;
            transition: opacity 0.4s ease-out, visibility 0.4s;
            z-index: 1000; /* Πάνω από όλα */
        }

        #lightbox.visible {
            opacity: 1;
            visibility: visible;
        }

        #lightbox-image {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        #lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2rem;
            color: #333;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        #lightbox-close:hover {
            color: #000;
        }

        /* Για κινητά */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="motto">shots by Nikolas Alvanidis</div>
        <h1>Digital Photos</h1>
    </header>

    <section class="category-section">
        <div class="category-title">Kraków, Poland</div>
        
        <div class="gallery">
            <div class="gallery-item"><img src="photos for portfolio/photo1.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo2.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo3.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo4.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo5.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo6.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo7.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo8.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo9.jpg"></div>
        </div>
    </section>

    <footer>
        &copy; NIKOLAS ALVANIDIS &copy; 2026 | ALL RIGHTS RESERVED
    </footer>

    <div id="lightbox">
        <button id="lightbox-close">&times;</button>
        <img id="lightbox-image" src="" alt="Expanded Photo">
    </div>

    <script>
        const galleryImages = document.querySelectorAll('.gallery img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const lightboxClose = document.getElementById('lightbox-close');

        galleryImages.forEach(image => {
            image.addEventListener('click', () => {
                lightboxImage.src = image.src; // Αντιγράφει το src της εικόνας
                lightbox.classList.add('visible'); // Εμφανίζει το lightbox
                document.body.style.overflow = 'hidden'; // Αποτρέπει το scrolling στη σελίδα
            });
        });

        const closeLightbox = () => {
            lightbox.classList.remove('visible'); // Κρύβει το lightbox
            document.body.style.overflow = ''; // Επαναφέρει το scrolling
        };

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (event) => {
            // Κλείνει αν κάνεις κλικ έξω από την εικόνα
            if (event.target === lightbox) {
                closeLightbox();
            }
        });

        // Κλείνει με το Escape key
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && lightbox.classList.contains('visible')) {
                closeLightbox();
            }
        });
    </script>

</body>
</html>
