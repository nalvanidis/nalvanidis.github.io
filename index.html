<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikolas Alvanidis | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Fredericka+the+Great&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff; /* Λευκό φόντο */
            color: #1a1a1a; /* Σχεδόν μαύρα γράμματα */
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Το πάνω μέρος (Header) */
        header {
            text-align: center;
            padding: 60px 20px 20px;
        }

        .motto {
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 300;
            margin-bottom: 10px;
            color: #333;
        }

        h1 {
            font-family: 'Fredericka the Great', cursive; /* Η "sketch" γραμματοσειρά */
            font-size: 5rem;
            margin: 0;
            font-weight: normal;
            text-transform: uppercase;
        }

        /* Μενού Πλοήγησης (Navigation) */
        nav {
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
            margin: 30px auto;
            max-width: 1200px;
            padding: 15px 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 100px; /* Απόσταση ανάμεσα στα μενού */
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: #888;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #000;
        }

        /* Κατηγορίες Φωτογραφιών */
        .category-section {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .category-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-align: left;
            font-style: italic;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            overflow: hidden;
            background-color: #f9f9f9;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: opacity 0.4s;
        }

        .gallery img:hover {
            opacity: 0.8; /* Απαλό εφέ στο λευκό φόντο */
        }

        footer {
            text-align: center;
            padding: 80px 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #aaa;
            text-transform: uppercase;
        }

        /* Για κινητά */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            nav ul { gap: 30px; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="motto">Ambition is the first step towards</div>
        <h1>Digital Photos</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">Kraków</a></li>
            <li><a href="#">Series</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </nav>

    <section class="category-section">
        <div class="category-title">Kraków, Poland</div>
        
        <div class="gallery">
            <div class="gallery-item"><img src="photos for portfolio/photo1.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo2.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo3.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo4.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo5.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo6.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo7.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo8.jpg"></div>
            <div class="gallery-item"><img src="photos for portfolio/photo9.jpg"></div>
        </div>
    </section>

    <footer>
        &copy; NIKOLAS ALVANIDIS &copy; 2026 | ALL RIGHTS RESERVED
    </footer>

</body>
</html>
